<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>經典背誦</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #8D6E63;
        --primary-dark: #4E342E;
        --bg: #94B5B2;
        --card: #ffffff;
      }

      body {
        background-color: var(--bg);
        color: #333;
        font-family: 'Noto Sans TC', sans-serif;
        margin: 0;
        padding: 0;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .view {
        display: none;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
        box-sizing: border-box;
      }

      .active-view {
        display: block;
      }

      .main-title {
        font-family: "Kaiti", "STKaiti", "BiauKai", "KaiTi", "Noto Serif TC", serif;
        font-size: clamp(36px, 10vw, 52px);
        font-weight: bold;
        color: var(--primary-dark);
        text-align: center;
        margin: 20px 0 40px;
        letter-spacing: 4px;
        text-shadow: 1px 1px 0px rgba(255,255,255,0.5), 2px 2px 4px rgba(0,0,0,0.1);
      }

      .category-header {
        font-size: 24px;
        color: #5D4037;
        margin-top: 30px;
        margin-bottom: 15px;
        border-left: 6px solid var(--primary);
        padding-left: 10px;
        font-weight: 700;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
      }

      .theme-card {
        background: var(--card);
        border-radius: 12px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        cursor: pointer;
        border: 1px solid #EFEBE9;
        overflow: hidden;
        transition: transform 0.2s;
      }

      .theme-card:active {
        transform: scale(0.96);
      }

      .card-content {
        padding: 15px;
        text-align: center;
        font-weight: bold;
        color: var(--primary-dark);
      }

      .nav-header {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
        background: #d3dcd8;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      }

      .back-btn {
        font-size: 28px;
        cursor: pointer;
        color: var(--primary);
        padding: 0 10px;
        min-width: 40px;
        text-align: center;
      }

      .nav-title {
        font-size: 20px;
        font-weight: 700;
        flex-grow: 1;
        text-align: center;
        color: var(--primary-dark);
      }

      .home-btn {
        display: inline-block;
        background:#Faf6f1;
        color: #4a4a4a;
        border: none;
        border-radius: 12px;
        padding: 10px 16px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        white-space: nowrap;
      }

      .home-btn:active {
        transform: scale(0.98);
      }

      .scripture-item {
        background:#d3dcd8;
        color: #4a4a4a;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 25px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      }

      .scripture-text {
        font-size: 22px;
        line-height: 2.0;
        color: #2c2c2c;
        font-weight: 500;
        margin-bottom: 15px;
      }

      .progress-area {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        border-top: 1px solid #eee;
        padding-top: 15px;
      }

      .stage-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #Faf6f1;
        color: #4a4a4a;
        border-radius: 12px;
        padding: 10px 5px;
        cursor: pointer;
      }

      .stage-name {
        font-size: 20px;
        font-weight: 500;
        color: #555;
      }

      .done-s1 {
        background-color: #E8F5E9;
        border-color: #81C784;
        color: #2E7D32;
      }

      .done-s2 {
        background-color: #E3F2FD;
        border-color: #64B5F6;
        color: #1565C0;
      }

      .done-s3 {
        background-color: #FFF3E0;
        border-color: #FFB74D;
        color: #EF6C00;
      }

      #practice-view {
        min-height: 100vh;
        padding-bottom: 140px;
      }

      #practice-container {
        background:#d3dcd8;
        border-radius: 16px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        font-size: 26px;
        line-height: 2.2;
        font-weight: 500;
        min-height: 200px;
      }

      .cloze-box {
        display: inline-block;
        min-width: 60px;
        height: auto;
        border-bottom: 3px solid #ccc;
        color: var(--primary);
        font-weight: bold;
        text-align: center;
        margin: 0 4px;
        padding: 0 5px;
        vertical-align: baseline;
        cursor: pointer;
      }

      .cloze-active {
        border-bottom: 3px solid #FFB74D;
        background-color: #FFF3E0;
      }

      .cloze-input {
        border: none;
        border-bottom: 2px solid var(--primary);
        background: #FAFAFA;
        font-size: 24px;
        color: var(--primary-dark);
        font-weight: bold;
        text-align: center;
        margin: 0 4px;
        padding: 0 5px;
        border-radius: 4px;
        outline: none;
        vertical-align: baseline;
        font-family: inherit;
      }

      #action-dock {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: #EFEBE9;
        padding: 20px;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        z-index: 100;
      }

      .word-btn {
        background-color: white;
        border: 2px solid var(--primary);
        color: #5D4037;
        font-size: 22px;
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 3px 0 #6D4C41;
      }

      .word-btn:active {
        transform: translateY(3px);
        box-shadow: none;
      }

      .word-used {
        opacity: 0;
        pointer-events: none;
      }

      .ctrl-btn {
        border: none;
        font-size: 20px;
        padding: 12px 30px;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }

      .btn-check {
        background-color: var(--primary);
        color: white;
      }

      .btn-peek {
        background-color: #FFB74D;
        color: #5D4037;
      }

      .btn-pass {
        background-color: #81C784;
        color: #1B5E20;
      }

      #overlay-success {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255,255,255,0.95);
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .lotus-anim {
        font-size: 100px;
        animation: bloom 0.8s ease-out;
      }

      @keyframes bloom {
        0% { transform: scale(0); opacity: 0; }
        80% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }

      .loading-text {
        text-align: center;
        padding: 50px 20px;
        color: #6D4C41;
        font-size: 18px;
      }

      #overlay-alert {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.35);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      }

      .alert-box {
        width: min(92vw, 420px);
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.18);
        overflow: hidden;
        animation: alertPop 0.18s ease-out;
      }

      @keyframes alertPop {
        from {
          transform: scale(0.95);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .alert-content {
        padding: 28px 22px 18px;
        text-align: center;
        color: #4E342E;
        font-size: 20px;
        line-height: 1.8;
        white-space: pre-line;
      }

      .alert-actions {
        padding: 0 20px 20px;
        display: flex;
        justify-content: center;
      }

      .alert-ok-btn {
        border: none;
        background: var(--primary);
        color: #fff;
        font-size: 18px;
        font-weight: bold;
        padding: 12px 32px;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      }

      .alert-ok-btn:active {
        transform: scale(0.98);
      }

      @media (max-width: 640px) {
        .home-btn {
          font-size: 14px;
          padding: 8px 12px;
        }

        .nav-title {
          font-size: 18px;
        }

        .alert-content {
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div id="dashboard-view" class="view">
      <div class="main-title">經典背誦</div>
      <div id="theme-container"></div>
    </div>

    <div id="scripture-view" class="view">
      <div class="nav-header">
        <div class="back-btn" id="scripture-back-btn" onclick="goToDashboard()">←</div>
        <div class="nav-title" id="page-title">載入中...</div>
        <button class="home-btn" onclick="goHomePage()">回到主畫面</button>
      </div>
      <div id="scripture-list">
        <div class="loading-text">恭請經文中...</div>
      </div>
    </div>

    <div id="practice-view" class="view">
      <div class="nav-header">
        <div class="back-btn" onclick="showView('scripture-view')">✕</div>
        <div class="nav-title" id="practice-title">練習</div>
        <button class="home-btn" onclick="goHomePage()">回到主畫面</button>
      </div>
      <div id="practice-container"></div>
      <div id="action-dock"></div>
    </div>

    <div id="overlay-success">
      <div class="lotus-anim">🪷</div>
      <h2 style="color:var(--primary-dark)">圓滿達成</h2>
    </div>

    <div id="overlay-alert" onclick="closeCustomAlert(event)">
      <div class="alert-box" onclick="event.stopPropagation()">
        <div class="alert-content" id="alert-message"></div>
        <div class="alert-actions">
          <button class="alert-ok-btn" onclick="closeCustomAlert()">確定</button>
        </div>
      </div>
    </div>

    <script>
      const JSON_URL = '../data/classic-recite.json';
      const HOME_PAGE_URL = '../';

      let allItems = [];
      let themes = [];
      let scriptures = [];
      let currentThemeId = null;
      let currentScriptureId = null;
      let lastScriptureScrollY = 0;
      let state = { sid: null, stage: 1, answers: [], blanks: [], currIdx: 0, cleanText: "" };

      window.onload = async () => {
        await initApp();
      };

      async function initApp() {
        try {
          const data = await fetchJson(JSON_URL);
          allItems = Array.isArray(data) ? data : [];

          if (!allItems.length) {
            throw new Error('JSON 內沒有資料');
          }

          themes = buildThemes(allItems);

          if (themes.length === 1) {
            loadTheme(themeKey(themes[0]), themes[0].title);
          } else {
            drawThemeCards();
            showView('dashboard-view');
          }
        } catch (error) {
          document.getElementById('theme-container').innerHTML =
            `<div class="loading-text">資料載入失敗：${escapeHtml(error.message || '請稍後再試')}</div>`;
          showView('dashboard-view');
        }
      }

      async function fetchJson(url) {
        const response = await fetch(url, {
          method: 'GET',
          cache: 'no-store'
        });

        if (!response.ok) {
          throw new Error(`網路連線失敗（${response.status}）`);
        }

        return await response.json();
      }

      function goHomePage() {
        window.location.href = HOME_PAGE_URL;
      }

      function buildThemes(items) {
        const map = new Map();

        items.forEach(item => {
          const id = item.themeId || item.source || 'default';
          const title = item.source || item.themeId || '經典背誦';

          if (!map.has(id)) {
            map.set(id, {
              id,
              title,
              count: 0
            });
          }

          map.get(id).count += 1;
        });

        return Array.from(map.values());
      }

      function themeKey(theme) {
        return theme.id;
      }

      function drawThemeCards() {
        const container = document.getElementById('theme-container');
        container.innerHTML = '';

        if (!themes.length) {
          container.innerHTML = "<div class='loading-text'>目前沒有可顯示的主題資料。</div>";
          return;
        }

        const title = document.createElement('div');
        title.className = 'category-header';
        title.textContent = '主題列表';
        container.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'card-grid';

        themes.forEach(theme => {
          const card = document.createElement('div');
          card.className = 'theme-card';
          card.onclick = () => loadTheme(themeKey(theme), theme.title);
          card.innerHTML = `
            <div class="card-content">
              <div>${escapeHtml(theme.title)}</div>
              <div style="margin-top:8px;font-size:14px;font-weight:500;">共 ${theme.count} 段</div>
            </div>
          `;
          grid.appendChild(card);
        });

        container.appendChild(grid);
      }

      function goToDashboard() {
        if (themes.length <= 1) {
          goHomePage();
          return;
        }

        drawThemeCards();
        showView('dashboard-view');
      }

      function loadTheme(tid, title) {
        currentThemeId = tid;
        showView('scripture-view');
        document.getElementById('page-title').innerText = title;

        document.getElementById('scripture-back-btn').style.visibility =
          themes.length > 1 ? 'visible' : 'hidden';

        document.getElementById('scripture-list').innerHTML =
          "<div class='loading-text'>恭請經文中...</div>";

        const filtered = allItems
          .filter(item => (item.themeId || item.source || 'default') === tid)
          .map(item => normalizeScripture(item));

        scriptures = filtered;
        drawScriptures();
      }

      function normalizeScripture(item) {
        const fullText = item.fullText || item.text || '';
        const cleanText = item.cleanText || fullText.replace(/\[|\]/g, '');
        const answers = Array.isArray(item.answers)
          ? item.answers
          : extractBracketAnswers(fullText);

        return {
          id: item.id || item.audioId || `item_${Math.random().toString(36).slice(2, 8)}`,
          text: fullText,
          cleanText,
          answers,
          progress: item.progress || { s1: 0, s2: 0, s3: 0 }
        };
      }

      function extractBracketAnswers(text) {
        const matches = String(text).match(/\[(.*?)\]/g) || [];
        return matches.map(v => v.replace(/^\[|\]$/g, ''));
      }

      function drawScriptures() {
        const con = document.getElementById('scripture-list');
        con.innerHTML = "";

        if (!scriptures.length) {
          con.innerHTML = "<div class='loading-text'>目前此主題尚無經文資料。</div>";
          return;
        }

        scriptures.forEach(s => {
          const div = document.createElement('div');
          div.className = 'scripture-item';
          const txt = (s.cleanText || '').trim();

          div.innerHTML = `
            <div class="scripture-text">${escapeHtml(txt)}</div>
            <div class="progress-area">
              <div class="stage-btn ${s.progress.s1 ? 'done-s1' : ''}" onclick="startPractice('${escapeJs(s.id)}', 1)">
                <div class="stage-name">配對填空</div>
              </div>
              <div class="stage-btn ${s.progress.s2 ? 'done-s2' : ''}" onclick="startPractice('${escapeJs(s.id)}', 2)">
                <div class="stage-name">輸入作答</div>
              </div>
              <div class="stage-btn ${s.progress.s3 ? 'done-s3' : ''}" onclick="startPractice('${escapeJs(s.id)}', 3)">
                <div class="stage-name">背誦練習</div>
              </div>
            </div>
          `;
          con.appendChild(div);
        });
      }

      function startPractice(sid, stage) {
        const s = scriptures.find(i => i.id === sid);
        if (!s) return;

        currentScriptureId = sid;

        const scriptureView = document.getElementById('scripture-view');
        if (scriptureView && scriptureView.classList.contains('active-view')) {
          lastScriptureScrollY = window.scrollY || window.pageYOffset || 0;
        }

        state = {
          sid,
          stage,
          answers: [],
          blanks: [],
          currIdx: 0,
          cleanText: s.cleanText || (s.text || '').replace(/\[|\]/g, '')
        };

        showView('practice-view');
        document.getElementById('practice-title').innerText =
          `${['', '配對填空', '輸入作答', '背誦練習'][stage]}`;

        const con = document.getElementById('practice-container');
        const dock = document.getElementById('action-dock');
        con.innerHTML = "";
        dock.innerHTML = "";

        if (stage === 3) {
          con.innerHTML = getHintHtml(state.cleanText);
          dock.innerHTML = `
            <button class="ctrl-btn btn-peek"
              onmousedown="peek(true)"
              onmouseup="peek(false)"
              onmouseleave="peek(false)"
              ontouchstart="peek(true)"
              ontouchend="peek(false)">
              按住提示
            </button>
            <button class="ctrl-btn btn-pass" onclick="finish()">圓滿背誦</button>
          `;
        } else {
          let html = "";
          (s.text || '').split(/(\[.*?\])/).forEach(p => {
            if (p.startsWith('[') && p.endsWith(']')) {
              const ans = p.slice(1, -1);
              const idx = state.answers.length;
              state.answers.push(ans);
              state.blanks.push(null);

              if (stage === 1) {
                html += `<span class="cloze-box" id="b-${idx}" onclick="state.currIdx=${idx};updateFocus()"></span>`;
              } else {
                html += `<input type="text" class="cloze-input" id="in-${idx}" style="width:${Math.max(60, ans.length * 28)}px">`;
              }
            } else {
              html += escapeHtml(p);
            }
          });

          con.innerHTML = html;

          if (stage === 1) {
            [...state.answers].sort(() => Math.random() - 0.5).forEach(w => {
              const b = document.createElement('div');
              b.className = 'word-btn';
              b.innerText = w;
              b.onclick = (e) => fill(w, e.target);
              dock.appendChild(b);
            });
            updateFocus();
          } else {
            dock.innerHTML = `<button class="ctrl-btn btn-check" onclick="checkStage2()">填完檢查</button>`;
          }
        }
      }

      function fill(word, btn) {
        if (state.currIdx >= state.answers.length) return;

        const old = state.blanks[state.currIdx];
        if (old) {
          document.querySelectorAll('.word-btn.word-used').forEach(b => {
            if (b.innerText === old) b.classList.remove('word-used');
          });
        }

        state.blanks[state.currIdx] = word;
        document.getElementById(`b-${state.currIdx}`).innerText = word;
        btn.classList.add('word-used');

        const next = state.blanks.indexOf(null);
        if (next !== -1) {
          state.currIdx = next;
          updateFocus();
        } else {
          updateFocus(-1);
          checkStage1();
        }
      }

      function checkStage1() {
        if (state.blanks.every((v, i) => v === state.answers[i])) {
          setTimeout(() => finish(), 300);
        } else {
          showCustomAlert("順序有點出入喔！\n請重新來過，再一次加深印象。", () => {
            startPractice(state.sid, 1);
          });
        }
      }

      function checkStage2() {
        let ok = true;

        state.answers.forEach((ans, i) => {
          const el = document.getElementById(`in-${i}`);
          if (!el) return;

          if (el.value.trim() === ans) {
            el.style.color = "#2E7D32";
            el.style.borderBottom = "3px solid #81C784";
            el.style.backgroundColor = "#E8F5E9";
            el.readOnly = true;
          } else {
            ok = false;
            el.style.color = "#D32F2F";
            el.style.borderBottom = "3px solid #EF9A9A";
            el.style.backgroundColor = "#FFEBEE";
          }
        });

        if (ok) {
          setTimeout(() => finish(), 300);
        } else {
          showCustomAlert("還有部分未正確，請修正紅框處。");
        }
      }

      function peek(show) {
        document.getElementById('practice-container').innerHTML =
          show ? escapeHtml(state.cleanText) : getHintHtml(state.cleanText);
      }

      function getHintHtml(txt) {
        let res = "";
        let next = true;

        for (let c of txt) {
          if ("，。、；：？！「」『』《》（）()[],.".includes(c)) {
            res += escapeHtml(c);
            next = true;
          } else if (c === '\n') {
            res += '<br>';
            next = true;
          } else if (c === ' ' || c === '　') {
            res += c;
          } else {
            res += next ? escapeHtml(c) : '＿';
            next = false;
          }
        }

        return `<div style="color:#aaa; letter-spacing:2px;">${res}</div>`;
      }

      function updateFocus(idx = state.currIdx) {
        document.querySelectorAll('.cloze-box').forEach((b, i) => {
          b.classList.toggle('cloze-active', i === idx);
        });
      }

      function finish() {
        const s = scriptures.find(i => i.id === state.sid);
        if (s) s.progress['s' + state.stage] = 1;

        const ov = document.getElementById('overlay-success');
        const scriptureView = document.getElementById('scripture-view');

        ov.style.display = 'flex';

        setTimeout(() => {
          ov.style.display = 'none';

          showView('scripture-view', false);

          scriptureView.style.visibility = 'hidden';
          drawScriptures();

          requestAnimationFrame(() => {
            window.scrollTo(0, lastScriptureScrollY);

            requestAnimationFrame(() => {
              scriptureView.style.visibility = 'visible';
            });
          });
        }, 1500);
      }

      function showView(vid, scrollTop = true) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById(vid).classList.add('active-view');

        if (scrollTop) {
          window.scrollTo(0, 0);
        }
      }

      let alertCallback = null;

      function showCustomAlert(message, callback = null) {
        document.getElementById('alert-message').innerText = message;
        document.getElementById('overlay-alert').style.display = 'flex';
        alertCallback = callback;
      }

      function closeCustomAlert(event) {
        if (event && event.target && event.target.id !== 'overlay-alert') return;

        document.getElementById('overlay-alert').style.display = 'none';

        if (typeof alertCallback === 'function') {
          const cb = alertCallback;
          alertCallback = null;
          cb();
        } else {
          alertCallback = null;
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeJs(str) {
        return String(str)
          .replace(/\\/g, '\\\\')
          .replace(/'/g, "\\'");
      }
    </script>
  </body>
</html>
